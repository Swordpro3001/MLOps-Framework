---
# =============================================================================
# Namespaces
# Two namespaces provide workload isolation between training and serving.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: traffic-training
---
apiVersion: v1
kind: Namespace
metadata:
  name: traffic-serving
---
# =============================================================================
# Secrets
# Sensitive values are stored as Kubernetes Secrets and injected via envFrom.
# These are created once by an operator and never committed to source control.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-credentials
  namespace: traffic-training
type: Opaque
stringData:
  tracking-uri: "http://mlflow:5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-credentials
  namespace: traffic-serving
type: Opaque
stringData:
  tracking-uri: "http://mlflow:5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: traffic-training
type: kubernetes.io/dockerconfigjson
stringData:
  # Replace with base64-encoded Docker config JSON for localhost:5555
  .dockerconfigjson: '{"auths":{"localhost:5555":{"auth":""}}}'
---
# =============================================================================
# ConfigMaps
# Non-sensitive configuration updated by the pipeline without image rebuilds.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: hyperparams-config
  namespace: traffic-training
data:
  hyperparams.yaml: |
    learning_rate: 0.001
    batch_size: 64
    epochs: 50
    early_stopping_patience: 5
    validation_split: 0.2
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-version-config
  namespace: traffic-serving
data:
  # Updated by the Jenkins deployment stage on every successful promotion.
  active_model_version: "1"
  active_run_id: ""
---
# =============================================================================
# PersistentVolumeClaim
# Shared storage for QGIS GeoPackage exports consumed by training jobs.
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traffic-data-pvc
  namespace: traffic-training
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi