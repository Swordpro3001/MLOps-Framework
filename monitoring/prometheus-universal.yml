# =============================================================================
# Prometheus Configuration — AI4Ads MLOps Framework
# Global scrape interval: 15 s (sufficient resolution without excessive storage)
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ml-devops'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # ---------------------------------------------------------------------------
  # Platform services
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          instance: 'ml-devops-host'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  # ---------------------------------------------------------------------------
  # CI/CD services
  # ---------------------------------------------------------------------------
  - job_name: 'jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['jenkins:8080']
        labels:
          service: 'jenkins'

  - job_name: 'gitlab'
    static_configs:
      - targets: ['gitlab:8929']
        labels:
          service: 'gitlab'

  # ---------------------------------------------------------------------------
  # ML services
  # ---------------------------------------------------------------------------
  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']
        labels:
          service: 'mlflow'

  - job_name: 'tensorboard'
    static_configs:
      - targets: ['tensorboard:6006']
        labels:
          service: 'tensorboard'

  # ---------------------------------------------------------------------------
  # Monitoring services
  # ---------------------------------------------------------------------------
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'

  # ---------------------------------------------------------------------------
  # Traffic-correction pipeline — project-specific scrape jobs
  # ---------------------------------------------------------------------------

  # Inference API deployed via KServe in the traffic-serving namespace.
  # Exposes /metrics with request latency, throughput, and prediction counts.
  - job_name: 'traffic-correction-api'
    static_configs:
      - targets: ['traffic-correction-api:8000']
        labels:
          service: 'traffic-api'
          namespace: 'traffic-serving'

  # Training job metrics pushed from inside the training container via the
  # Prometheus client library. Metrics include validation loss, the number of
  # flow-conservation violations detected per batch, and hyperparameter values.
  - job_name: 'training-pushgateway'
    # honor_labels preserves the job/instance labels set by the push client,
    # allowing per-run metrics to be distinguished in dashboards.
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
        labels:
          service: 'ml-training'

  # ---------------------------------------------------------------------------
  # Optional: Docker daemon metrics
  # Requires experimental metrics enabled in /etc/docker/daemon.json:
  #   { "metrics-addr": "0.0.0.0:9323", "experimental": true }
  # ---------------------------------------------------------------------------
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
        labels:
          service: 'docker'

  - job_name: 'gpu-exporter'
    static_configs:
      - targets: ['gpu-exporter:9445']
        labels:
          service: 'gpu-exporter'